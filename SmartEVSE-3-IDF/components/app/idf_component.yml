## IDF Component Manager Manifest File
dependencies:
  ## Required IDF version
  idf:
    version: '>=4.1.0'
  # # Put list of dependencies here
  # # For components maintained by Espressif:
  # component: "~1.0.0"
  # # For 3rd party components:
  # username/component: ">=1.0.0,<2.0.0"
  # username2/component2:
  #   version: "~1.0.0"
  #   # For transient dependencies `public` flag can be set.
  #   # `public` flag doesn't have an effect dependencies of the `main` component.
  #   # All dependencies of `main` are public by default.
  #   public: true
  espressif/mqtt: '*'
  espressif/mdns: '*'
  # esp_littlefs — ESP-IDF VFS layer for LittleFS. Used by MicroOcpp
  # (MO_USE_FILEAPI=ESPIDF_LITTLEFS) for persisting OCPP config and
  # credentials on the "spiffs" data partition.
  joltwallet/littlefs: '*'
  # espressif/onewire_bus is vendored into components/onewire_bus (with a
  # SmartEVSE-specific read-slot timing fix) instead of pulled as a managed
  # dependency, so it is intentionally not listed here.
