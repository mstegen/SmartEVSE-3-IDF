name: Create Release

# Replaces the old `Create Release` workflow (pio-release.yaml). It
# still extracts a version from the pushed tag and hands off to the
# build workflow (now idf-build.yaml) for the actual firmware, then
# attaches the result to a GitHub Release and uploads the signed
# binaries to the SmartEVSE-3 S3 bucket (eu-west-2).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      major: ${{ steps.get_version.outputs.major }}
      minor: ${{ steps.get_version.outputs.minor }}
      patch: ${{ steps.get_version.outputs.patch }}
      prerelease: ${{ steps.get_version.outputs.prerelease }}
    steps:
      - id: get_version
        uses: battila7/get-version-action@v2

  build:
    needs: version
    uses: ./.github/workflows/idf-build.yaml
    with:
      major: ${{ needs.version.outputs.major }}
      minor: ${{ needs.version.outputs.minor }}
      patch: ${{ needs.version.outputs.patch }}
      prerelease: ${{ needs.version.outputs.prerelease }}
    secrets: inherit

  release:
    permissions:
      contents: write
    needs: build
    name: Upload Release Asset
    runs-on: ubuntu-latest
    steps:
      - name: Get current tag
        id: tag
        run: echo "tag=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact }}
          path: dist

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Zip artifacts
        run: zip -j ${{ steps.tag.outputs.tag }}-dist.zip ./dist/*

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: ${{ steps.tag.outputs.tag }}-dist.zip
          tag_name: ${{ github.ref_name }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Upload files to S3
        # Only push the signed firmware (if present) to the public
        # bucket; the unsigned firmware.bin stays inside the GitHub
        # Release artifact. The ESP-IDF build does not produce a
        # separate debug variant — DBG/LOG_LEVEL are baked into the
        # single sdkconfig.defaults used by the build.
        run: |
          set -euo pipefail
          if [ -f ./dist/firmware.signed.bin ]; then
            aws s3 cp ./dist/firmware.signed.bin \
              s3://smartevse-3/${{ github.repository_owner }}_firmware.signed.bin
          fi